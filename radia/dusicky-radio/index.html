<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕯️ Dušičky</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../template-radio/style.css">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="effects.css">
</head>
<body data-start="2026-07-24T08:25:00">

    <div class="radio">
    <div class="title">

<svg class="candle" viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg">

    <!-- záře -->
    <ellipse class="glow"
             cx="30"
             cy="18"
             rx="12"
             ry="16"/>

    <!-- vnější plamen -->
    <path class="flame-outer"
          d="M30 6
             C22 18 22 28 30 36
             C38 28 38 18 30 6Z"/>

    <!-- vnitřní plamen -->
    <path class="flame-inner"
          d="M30 14
             C26 22 27 28 30 32
             C33 28 34 22 30 14Z"/>

    <!-- svíčka -->
    <rect class="wax"
          x="18"
          y="36"
          width="24"
          height="40"
          rx="4"/>

    <!-- kapka vosku -->
    <path class="drip"
          d="M28 38
             c-1.8 2.4 -1.8 4.6 0 6
             c1.8 -1.4 1.8 -3.6 0 -6Z"/>

</svg>

<h1>Dušičky</h1>

</div>
    <audio id="audio"></audio>
    <div class="player-card">
        <div class="vinyl-wrapper">
            <div class="vinyl">
                <div class="center-label"></div>
            </div>
            <button id="play" class="play-btn">▶</button>
        </div>
        <div class="progress-container">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="time-labels">
                <span id="current-time">00:00</span>
                <span id="duration-time">00:00</span>
            </div>
        </div>
    </div>
    <div class="volume-control">
        <button id="mute">
            🔊
        </button>
        <input 
            type="range" 
            id="volume"
            min="0"
            max="1"
            step="0.01"
            value="0.7"
        >
    </div>
</div>
<script src="../template-radio/assets/script.js?v=2"></script>
</body>
</html>
