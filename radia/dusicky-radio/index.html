<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕯️ Dušičky</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../template-radio/style.css">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="effects.css">
</head>
<body data-start="2026-07-24T08:25:00">
<div class="radio">
    <div class="title">
    <span class="candle">🕯️</span>
    <h1>Dušičky</h1>
</div>
    <audio id="audio"></audio>
    <div class="player-card">
        <div class="vinyl-wrapper">
            <div class="vinyl">
                <div class="center-label"></div>
            </div>
            <button id="play" class="play-btn">▶</button>
        </div>
        <div class="progress-container">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="time-labels">
                <span id="current-time">00:00</span>
                <span id="duration-time">00:00</span>
            </div>
        </div>
    </div>
    <div class="volume-control">
        <button id="mute">
            🔊
        </button>
        <input 
            type="range" 
            id="volume"
            min="0"
            max="1"
            step="0.01"
            value="0.7"
        >
    </div>
</div>
<script src="../template-radio/assets/script.js?v=2"></script>
</body>
</html>
