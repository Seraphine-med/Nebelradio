<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Template</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-start="2026-07-24T08:25:00">
<div class="radio">
    <h1>RADIO</h1>
    <audio id="audio"></audio>

    <div class="player-card">

        <div class="vinyl-wrapper">
            <div class="vinyl">
                <div class="center-label"></div>
            </div>

            <button id="play" class="play-btn">▶</button>
        </div>

        <div class="song-info">
</div>

        <div class="progress-container">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="time-labels">
                <span id="current-time">00:00</span>
                <span id="duration-time">00:00</span>
            </div>
        </div>

    </div>

    <div class="volume-control">
        <button id="mute">
            🔊
        </button>
        <input 
            type="range" 
            id="volume"
            min="0"
            max="1"
            step="0.01"
            value="0.7"
        >
    </div>
</div>
<script src="config.js"></script>

<script>
    if (ACTIVE_RADIO !== "template-radio") {
        window.location.href = `radia/${ACTIVE_RADIO}/index.html`;
    }
</script>
</body>
</html>
